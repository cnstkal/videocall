<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LINE Style Messenger</title>
  <link rel="stylesheet" href="style.css?v=20260428-2" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-area"><div class="brand-logo">L</div><strong>LINE</strong></div>
      <nav class="side-nav">
        <button class="nav-btn active" data-page="home" type="button">홈</button>
        <button class="nav-btn" data-page="chats" type="button">채팅</button>
        <button class="nav-btn" data-page="calls" type="button">통화</button>
        <button class="nav-btn" data-page="friends" type="button">친구</button>
        <button class="nav-btn" data-page="more" type="button">더보기</button>
      </nav>
    </aside>

    <main class="app-main">
      <section class="page active" id="home">
        <header class="page-header green"><div><p>Friends</p><h1>홈</h1></div></header>
        <div class="home-grid">
          <section class="my-profile card">
            <div class="avatar large" id="myAvatar">C</div>
            <div><h2 id="myNameView">CLOW official</h2><p>내 프로필을 자유롭게 바꿀 수 있어요</p></div>
          </section>
          <section class="card profile-editor">
            <h2>내 프로필 변경</h2>
            <input id="profileName" placeholder="이름 입력" value="CLOW official" />
            <input id="profilePhoto" type="file" accept="image/*" />
            <button id="saveProfile" type="button">저장</button>
          </section>
          <section class="card menu-card">
            <h2>바로가기</h2>
            <div class="quick-grid"><button data-page="chats" type="button">채팅</button><button data-page="calls" type="button">통화</button><button data-page="friends" type="button">친구</button><button data-page="more" type="button">더보기</button></div>
          </section>
        </div>
      </section>

      <section class="page" id="chats">
        <div class="chat-layout">
          <section class="chat-list-panel">
            <header class="list-header"><h1>채팅</h1><button id="addChatBtn" type="button">＋</button></header>
            <div id="chatList"></div>
          </section>
          <section class="room active" id="chatRoom">
            <header class="room-header">
              <button class="back-to-list" type="button">‹</button><div class="avatar blue" id="roomAvatar">R</div><div><strong id="roomName">린위</strong><span>온라인</span></div>
              <button class="call-btn" id="videoCallBtn" type="button">영통</button>
            </header>
            <div class="messages" id="messages"></div>
            <form class="composer" id="composer"><button type="button" id="photoBtn">사진</button><input id="photoInput" type="file" accept="image/*" hidden><input id="messageInput" autocomplete="off" placeholder="메시지를 입력하세요"/><button id="sendBtn" type="submit">전송</button></form>
          </section>
        </div>
      </section>

      <section class="page simple" id="calls"><h1>통화</h1><p id="callLog">최근 통화 목록이 여기에 표시됩니다.</p></section>
      <section class="page simple" id="friends"><h1>친구</h1><p>친구 목록과 추천 친구 영역입니다.</p></section>
      <section class="page simple" id="more"><h1>더보기</h1><p>스티커, 앨범, 설정 같은 메뉴 영역입니다.</p></section>
    </main>
  </div>

  <div class="modal" id="addChatModal"><div class="modal-box"><h2>채팅 추가</h2><input id="newChatName" placeholder="상대 이름"><button id="createChat" type="button">추가</button><button id="closeModal" type="button">취소</button></div></div>

  <script src="app.js?v=20260428-2"></script>
</body>
</html>
